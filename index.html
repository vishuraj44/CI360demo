<!DOCTYPE html>
<html>
<head>
  <title>SmartTel CI360 Demo</title>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css">

  <!-- CI360 INIT -->
  <script>
  (function(ci, a) {
    window[ci] = window[ci] || function() {
      (window[ci].q = window[ci].q || []).push(arguments);
    };
    window[ci].a = a || {};
  })('ci360', { tenantId: '2a7ea85c0b000164f7542674' });
  </script>

  <!-- CI360 SCRIPT -->
  <script async data-efname='ci360'
    src='https://ingest-training.ci360.sas.com/js/ot2.min.js'
    id='ob-script-async'></script>

  <script>
    function sendEvent(name, data) {
      try {
        ci360('send', 'event', name, data);
        console.log('Event Sent:', name, data);
      } catch (e) {
        console.error('Event Error:', e);
      }
    }

    window.addEventListener('load', function() {
      setTimeout(function() {
        sendEvent('page_view', { page: window.location.pathname });
      }, 1000);
    });
  </script>
</head>
<body>

<nav class="navbar navbar-dark bg-dark p-3">
  <a class="navbar-brand" href="index.html">SmartTel</a>
</nav>

<div class="container mt-4">

  <!-- PERSONALIZATION SPOT -->
  <div data-ef-spot="offer_spot" class="alert alert-warning text-center">
    🔥 Default Offer: Explore our plans
  </div>

  <!-- PREPAID -->
  <h3>Prepaid</h3>
  <div class="card p-3 mb-3">
    <h5>Prepaid Plans</h5>
    <a href="prepaid.html" class="btn btn-primary"
       onclick="sendEvent('plan_select', { plan_type: 'prepaid' })">
       View Prepaid Plans
    </a>
  </div>

  <!-- POSTPAID -->
  <h3>Postpaid</h3>
  <div class="card p-3 mb-3">
    <h5>Postpaid Plans</h5>
    <a href="postpaid.html" class="btn btn-success"
       onclick="sendEvent('plan_select', { plan_type: 'postpaid' })">
       View Postpaid Plans
    </a>
  </div>

</div>

</body>
</html>
